<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lumeet | Dating + Messaging + Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== ALL CSS STYLES (same as before) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Poppins', sans-serif; }
        body { min-height: 100vh; background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format') center/cover no-repeat fixed; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(4px); z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.18); backdrop-filter: blur(14px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.35); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); transition: transform 0.2s, box-shadow 0.2s; }
        .gradient-btn { background: linear-gradient(135deg, #c5e99b 0%, #56ab2f 100%); border: none; color: #1e2a1e; font-weight: 700; padding: 14px 20px; border-radius: 60px; width: 100%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .gradient-btn:hover { transform: scale(0.98); }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card { width: 100%; max-width: 440px; padding: 2rem 1.8rem; text-align: center; }
        .logo-icon { font-size: 3.2rem; color: #ffdf7e; }
        .logo-area h1 { font-size: 2.3rem; background: linear-gradient(135deg, #fff, #f9e45b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .input-group { position: relative; margin: 1.2rem 0; }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(255,255,240,0.9); }
        .input-group input, .input-group select { width: 100%; padding: 14px 20px 14px 48px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 60px; font-size: 1rem; color: white; }
        .toggle-pwd { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: white; }
        .switch-auth a { color: #ffec99; text-decoration: none; }
        .app-main { display: none; max-width: 550px; margin: 0 auto; padding: 20px 12px 80px; min-height: 100vh; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20,20,30,0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-around; align-items: center; padding: 12px 20px 24px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #ccc; font-size: 0.7rem; cursor: pointer; transition: 0.2s; padding: 4px 12px; border-radius: 30px; }
        .nav-item i { font-size: 1.6rem; }
        .nav-item.active { color: #f5b042; text-shadow: 0 0 8px #ffb347; background: rgba(255,255,255,0.1); }
        .view { display: none; animation: fade 0.25s ease; }
        .active-view { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
        .cards-container { position: relative; width: 100%; height: 65vh; display: flex; justify-content: center; align-items: center; }
        .swipe-card { width: 90%; max-width: 340px; background: rgba(30,30,45,0.55); backdrop-filter: blur(16px); border-radius: 36px; padding: 20px; text-align: center; }
        .card-img { width: 100%; height: 240px; border-radius: 28px; object-fit: cover; }
        .action-buttons { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
        .action-circle { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 15px; border-radius: 60px; cursor: pointer; }
        .like-btn { color: #4cff8e; }
        .pass-btn { color: #ff6b6b; }
        .explore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-top: 20px; }
        .explore-card { background: rgba(255,255,245,0.15); backdrop-filter: blur(8px); border-radius: 28px; padding: 12px; text-align: center; }
        .small-glass { background: rgba(255,255,200,0.25); border: none; border-radius: 60px; padding: 8px 16px; color: white; cursor: pointer; }
        .chat-list-container, .chat-screen-container { background: rgba(0,0,0,0.3); backdrop-filter: blur(12px); border-radius: 32px; overflow: hidden; margin-top: 12px; }
        .search-bar { padding: 12px; background: rgba(255,255,255,0.1); margin: 8px; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
        .search-bar i { color: white; margin-left: 12px; }
        .search-bar input { background: transparent; border: none; color: white; flex: 1; outline: none; }
        .chat-list-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.1s; }
        .chat-list-item:hover { background: rgba(255,255,255,0.1); }
        .avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; position: relative; }
        .online-dot { position: absolute; width: 14px; height: 14px; background: #22c55e; border-radius: 50%; border: 2px solid white; bottom: 2px; right: 2px; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; color: white; }
        .last-msg { font-size: 0.75rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .chat-meta { text-align: right; }
        .time { font-size: 0.7rem; color: #aaa; }
        .unread-badge { background: #22c55e; color: white; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; margin-top: 4px; display: inline-block; }
        .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .back-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .chat-profile { display: flex; align-items: center; gap: 10px; }
        .chat-profile img { width: 44px; height: 44px; border-radius: 50%; }
        .chat-status { font-size: 0.7rem; color: #ccc; }
        .chat-actions i { font-size: 1.3rem; margin-left: 16px; color: white; cursor: pointer; }
        .messages-area { height: 55vh; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message-bubble { max-width: 80%; padding: 10px 14px; border-radius: 22px; animation: fadeInUp 0.2s ease; }
        .received { background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); align-self: flex-start; border-bottom-left-radius: 4px; color: white; }
        .sent { background: linear-gradient(135deg, #22c55e, #15803d); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .message-time { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; }
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: rgba(255,255,255,0.1); border-radius: 20px; width: fit-content; margin: 8px 0; }
        .typing-dot { width: 6px; height: 6px; background: #ccc; border-radius: 50%; animation: pulse 1s infinite; }
        .input-area { display: flex; align-items: center; gap: 8px; padding: 12px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
        .input-area input { flex: 1; background: rgba(255,255,255,0.2); border: none; border-radius: 30px; padding: 12px 18px; color: white; outline: none; }
        .input-area button { background: #22c55e; border: none; width: 44px; height: 44px; border-radius: 50%; color: white; cursor: pointer; }
        .reply-preview { background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 16px; font-size: 0.8rem; margin-bottom: 8px; display: none; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100%{ opacity: 0.3; } 50%{ opacity: 1; } }
        .profile-top { text-align: center; margin-bottom: 24px; }
        .profile-pic-large { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #ffd966; margin-bottom: 12px; position: relative; }
        .camera-overlay { position: absolute; bottom: 5px; right: calc(50% - 55px); background: #22c55e; border-radius: 50%; padding: 8px; cursor: pointer; border: 2px solid white; }
        .verified-badge { color: #3b82f6; margin-left: 6px; font-size: 1.2rem; vertical-align: middle; }
        .stats-row { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); border-radius: 28px; padding: 12px; margin: 16px 0; text-align: center; color: white; }
        .action-buttons-row { display: flex; gap: 12px; margin: 16px 0; }
        .action-buttons-row button { flex: 1; background: rgba(255,255,255,0.2); border: none; border-radius: 40px; padding: 10px; color: white; font-weight: 500; cursor: pointer; }
        .settings-list { background: rgba(0,0,0,0.3); border-radius: 32px; overflow: hidden; margin-top: 16px; }
        .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: white; }
        .settings-item-left { display: flex; align-items: center; gap: 14px; }
        .toggle-switch { width: 48px; height: 24px; background: rgba(255,255,255,0.3); border-radius: 30px; position: relative; transition: 0.2s; cursor: pointer; }
        .toggle-switch.active { background: #22c55e; }
        .toggle-knob { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.2s; }
        .toggle-switch.active .toggle-knob { left: 25px; }
        .edit-profile-form input, .edit-profile-form textarea, .edit-profile-form select { width: 100%; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 28px; padding: 12px; margin: 8px 0; color: white; outline: none; }
        .edit-profile-form input:focus { border-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .interests-tag-input { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .tag { background: #22c55e; padding: 6px 12px; border-radius: 30px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }
        .tag i { cursor: pointer; font-size: 0.7rem; }
        .premium-card { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05)); border: 1px solid gold; border-radius: 28px; padding: 16px; margin-top: 16px; text-align: center; }
        .back-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .back-header button { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .progress-bar { background: rgba(255,255,255,0.2); border-radius: 20px; height: 6px; width: 100%; margin: 12px 0; }
        .progress-fill { background: #22c55e; width: 0%; height: 6px; border-radius: 20px; }
        .last-seen-preview { font-size: 0.7rem; color: #aaa; margin-top: 4px; }
        .slider-container { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
        input[type="range"] { flex: 1; background: rgba(255,255,255,0.2); height: 4px; border-radius: 5px; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #22c55e; cursor: pointer; }
        .photo-grid { display: flex; gap: 8px; margin: 12px 0; overflow-x: auto; }
        .photo-grid img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; }
    </style>
</head>
<body>
<div class="bg-overlay"></div>

<!-- LOGIN / SIGNUP -->
<div id="loginView" class="auth-container"><div class="glass-card auth-card"><div class="logo-area"><i class="fas fa-heart logo-icon"></i><h1>Lumeet</h1><p>where sparks glow</p></div><form id="loginFormElem"><div class="input-group"><i class="fas fa-envelope input-icon"></i><input type="email" id="loginEmail" placeholder="Email" required></div><div class="input-group"><i class="fas fa-lock input-icon"></i><input type="password" id="loginPassword" placeholder="Password"><i class="fas fa-eye-slash toggle-pwd" data-target="loginPassword"></i></div><button type="submit" class="gradient-btn">Log In</button><p class="switch-auth">No account? <a href="#" id="goToSignupLink">Sign up</a></p></form></div></div>
<div id="signupView" class="auth-container" style="display:none;"><div class="glass-card auth-card"><h2 style="color:white;">Create account</h2><form id="signupFormElem"><div class="input-group"><i class="fas fa-user input-icon"></i><input type="text" id="signupName" placeholder="Full name"></div><div class="input-group"><i class="fas fa-envelope input-icon"></i><input type="email" id="signupEmail" placeholder="Email"></div><div class="input-group"><i class="fas fa-lock input-icon"></i><input type="password" id="signupPassword" placeholder="Password"></div><div class="input-group"><i class="fas fa-check-circle input-icon"></i><input type="password" id="confirmPwd" placeholder="Confirm password"></div><div class="input-group"><i class="fas fa-venus-mars input-icon"></i><select id="signupGender"><option>Female</option><option>Male</option></select></div><div class="input-group"><i class="fas fa-calendar input-icon"></i><input type="number" id="signupAge" placeholder="Age"></div><button type="submit" class="gradient-btn">Create account</button><p class="switch-auth">Already a member? <a href="#" id="goToLoginLink">Log in</a></p></form></div></div>

<!-- MAIN APP -->
<div id="mainApp" class="app-main">
    <div id="swipeView" class="view"><h2 style="color:white; text-align:center;">Swipe</h2><div id="cardsStack" class="cards-container"></div><div class="action-buttons"><div class="action-circle pass-btn" id="passBtn"><i class="fas fa-times fa-2x"></i></div><div class="action-circle like-btn" id="likeBtn"><i class="fas fa-heart fa-2x"></i></div></div><div id="matchToast" style="position:fixed; bottom:30%; left:10%; right:10%; background:gold; border-radius:50px; text-align:center; padding:12px; display:none; z-index:200;">✨ It's a match! ✨</div></div>
    <div id="exploreView" class="view"><h2 style="color:white;">Discover</h2><div style="display:flex; gap:8px;"><input type="number" id="filterAge" placeholder="Max age" style="background:rgba(255,255,255,0.2); border-radius:40px; padding:8px;"><select id="filterGender" style="background:rgba(255,255,255,0.2); border-radius:40px;"><option value="">Any gender</option><option>Female</option><option>Male</option></select><button id="applyFilterBtn" class="small-glass">Filter</button></div><div id="exploreList" class="explore-grid"></div></div>
    <div id="messagesView" class="view"><div id="chatListContainer" class="chat-list-container"></div><div id="chatScreenContainer" class="chat-screen-container" style="display:none;"></div></div>
    <div id="profileView" class="view"><div class="glass-card" style="padding:20px;"><div style="text-align:right;"><i class="fas fa-cog" id="openSettingsBtn" style="font-size:1.5rem; color:white; cursor:pointer;"></i></div><div class="profile-top"><div style="position:relative; display:inline-block;"><img id="profileAvatar" class="profile-pic-large" src=""><div class="camera-overlay" id="changePhotoBtn"><i class="fas fa-camera"></i></div><input type="file" id="photoUploadInput" style="display:none;" accept="image/*"></div><h2 style="color:white; margin-top:8px;"><span id="profileUsername"></span><i class="fas fa-check-circle verified-badge" style="display:none;"></i></h2><p id="profileStatus" style="color:#ccc;"></p><div class="last-seen-preview" id="lastSeenPreview"></div><div class="progress-bar"><div class="progress-fill" id="profileProgress"></div></div><div class="stats-row"><div><strong id="matchesCount">0</strong><br>Matches</div><div><strong id="likesCount">0</strong><br>Likes</div><div><strong id="viewsCount">0</strong><br>Views</div></div><div class="action-buttons-row"><button id="editProfileBtn"><i class="fas fa-edit"></i> Edit Profile</button><button id="shareProfileBtn"><i class="fas fa-share-alt"></i> Share</button><button id="boostProfileBtn"><i class="fas fa-rocket"></i> Boost</button></div></div><div class="settings-list" id="settingsListContainer"></div><button id="logoutBtnProfile" style="background:rgba(255,80,80,0.5); border:none; border-radius:60px; padding:12px; width:100%; margin-top:20px; color:white;">Logout</button></div></div>

    <!-- Subviews -->
    <div id="editProfileView" class="view" style="display:none;"><div class="glass-card" style="padding:20px;"><div class="back-header"><button id="backFromEdit"><i class="fas fa-arrow-left"></i></button><h2 style="color:white;">Edit Profile</h2></div><div class="edit-profile-form"><div class="photo-grid" id="photoGrid"></div><input type="text" id="editName" placeholder="Name"><textarea id="editBio" rows="2" placeholder="Bio"></textarea><select id="editGender"><option>Female</option><option>Male</option></select><input type="number" id="editAge" placeholder="Age"><input type="text" id="editLocation" placeholder="Location"><label style="color:white;">Interests (add tags):</label><div class="interests-tag-input" id="interestsContainer"></div><input type="text" id="newInterestInput" placeholder="Type interest and press Enter" style="margin-top:4px;"><button id="saveProfileChanges" class="gradient-btn" style="margin-top:16px;">Save Changes</button></div></div></div>
    <div id="settingsDetailView" class="view" style="display:none;"><div class="glass-card" style="padding:20px;"><div class="back-header"><button id="backFromSettings"><i class="fas fa-arrow-left"></i></button><h2 id="settingsTitle" style="color:white;">Settings</h2></div><div id="settingsDetailContent"></div></div></div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" data-nav="swipe"><i class="fas fa-fire"></i><span>Swipe</span></div>
        <div class="nav-item" data-nav="explore"><i class="fas fa-compass"></i><span>Explore</span></div>
        <div class="nav-item" data-nav="messages"><i class="fas fa-comment-dots"></i><span>Chats</span></div>
        <div class="nav-item" data-nav="profile"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>
</div>

<script>
    // ========== ALL JAVASCRIPT (same as before) ==========
    function initDummyData() {
        if (!localStorage.getItem('datingAppUsers')) {
            const demo = [
                { id: "u1", name: "Emma", email: "emma@lumeet.com", password: "pass", gender: "Female", age: 26, bio: "Adventure lover, hiking & coffee", interests: ["hiking","travel"], location: "Austin", profilePic: "https://randomuser.me/api/portraits/women/44.jpg", likedBy: [], swipedRight: [], swipedLeft: [], matches: ["u2"], profileViews: 42, likesReceived: 12, isPremium: false, lastSeen: new Date().toISOString(), online: true },
                { id: "u2", name: "Liam", email: "liam@lumeet.com", password: "pass", gender: "Male", age: 28, bio: "Art & music lover", interests: ["music","art"], location: "Seattle", profilePic: "https://randomuser.me/api/portraits/men/32.jpg", likedBy: ["u1"], swipedRight: [], swipedLeft: [], matches: ["u1"], profileViews: 30, likesReceived: 8, isPremium: false, lastSeen: new Date(Date.now() - 3600000).toISOString(), online: false },
                { id: "u3", name: "Sophia", email: "sophia@lumeet.com", password: "pass", gender: "Female", age: 24, bio: "Yoga & sunset chaser", interests: ["yoga","photography"], location: "Miami", profilePic: "https://randomuser.me/api/portraits/women/68.jpg", likedBy: [], swipedRight: [], swipedLeft: [], matches: [], profileViews: 15, likesReceived: 5, isPremium: false, lastSeen: new Date(Date.now() - 86400000).toISOString(), online: true }
            ];
            localStorage.setItem('datingAppUsers', JSON.stringify(demo));
            const initialMsgs = { "u1_u2": [{ id: "m1", senderId: "u2", text: "Hey Emma! Love your profile 😊", timestamp: Date.now() - 7200000, status: "read" }, { id: "m2", senderId: "u1", text: "Thanks Liam! You too 🔥", timestamp: Date.now() - 3600000, status: "read" }] };
            localStorage.setItem('matchesMessages', JSON.stringify(initialMsgs));
        }
        if (!localStorage.getItem('appSettings')) localStorage.setItem('appSettings', JSON.stringify({ lastSeen: true, onlineStatus: true, profileVisibility: "public", messageNotif: true }));
        if (!localStorage.getItem('datingPreferences')) localStorage.setItem('datingPreferences', JSON.stringify({ ageMin: 22, ageMax: 35, distance: 50 }));
    }
    function getUsers() { return JSON.parse(localStorage.getItem('datingAppUsers')); }
    function saveUsers(users) { localStorage.setItem('datingAppUsers', JSON.stringify(users)); }
    function getMessagesStore() { return JSON.parse(localStorage.getItem('matchesMessages') || '{}'); }
    function saveMessagesStore(obj) { localStorage.setItem('matchesMessages', JSON.stringify(obj)); }
    let currentUser = null;
    function updateCurrentUserInDB(updatedUser) { let users = getUsers(); const idx = users.findIndex(u => u.id === updatedUser.id); if (idx !== -1) users[idx] = updatedUser; saveUsers(users); currentUser = updatedUser; localStorage.setItem('currentUser', JSON.stringify(currentUser)); }

    // Auth
    const loginView = document.getElementById('loginView'), signupView = document.getElementById('signupView'), mainApp = document.getElementById('mainApp');
    document.getElementById('goToSignupLink')?.addEventListener('click', (e) => { e.preventDefault(); loginView.style.display = 'none'; signupView.style.display = 'flex'; });
    document.getElementById('goToLoginLink')?.addEventListener('click', (e) => { e.preventDefault(); signupView.style.display = 'none'; loginView.style.display = 'flex'; });
    document.getElementById('signupFormElem')?.addEventListener('submit', (e) => { e.preventDefault(); const name = document.getElementById('signupName').value, email = document.getElementById('signupEmail').value, pwd = document.getElementById('signupPassword').value, confirm = document.getElementById('confirmPwd').value; if (pwd !== confirm) { alert("Passwords mismatch"); return; } let users = getUsers(); if (users.find(u => u.email === email)) { alert("Email exists"); return; } const newUser = { id: "u" + Date.now(), name, email, password: pwd, gender: document.getElementById('signupGender').value, age: parseInt(document.getElementById('signupAge').value) || 22, bio: "New here!", interests: [], location: "Unknown", profilePic: "https://randomuser.me/api/portraits/lego/1.jpg", likedBy: [], swipedRight: [], swipedLeft: [], matches: [], profileViews: 0, likesReceived: 0, isPremium: false, lastSeen: new Date().toISOString(), online: true }; users.push(newUser); saveUsers(users); alert("Account created! Please login."); signupView.style.display = 'none'; loginView.style.display = 'flex'; });
    function loginUser(email, pwd) { const users = getUsers(); const user = users.find(u => u.email === email && u.password === pwd); if (user) { currentUser = JSON.parse(JSON.stringify(user)); localStorage.setItem('currentUser', JSON.stringify(currentUser)); return true; } return false; }
    document.getElementById('loginFormElem')?.addEventListener('submit', (e) => { e.preventDefault(); if (loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)) showMainApp(); else alert("Invalid credentials"); });
    function showMainApp() { loginView.style.display = 'none'; signupView.style.display = 'none'; mainApp.style.display = 'block'; loadCurrentUser(); renderAll(); attachNavEvents(); renderSwipeCards(); renderChatList(); }
    function loadCurrentUser() { const stored = localStorage.getItem('currentUser'); if (stored) currentUser = JSON.parse(stored); else window.location.reload(); }

    // Swipe & Explore
    function getAvailableProfiles() { const users = getUsers(); return users.filter(u => u.id !== currentUser.id && !currentUser.swipedRight?.includes(u.id) && !currentUser.swipedLeft?.includes(u.id)); }
    function renderSwipeCards() { let available = getAvailableProfiles(); if(available.length===0){ document.getElementById('cardsStack').innerHTML=`<div class="glass-card" style="padding:30px;text-align:center;">✨ No more profiles ✨</div>`; return; } let idx=0; const container=document.getElementById('cardsStack'); function display(){ if(idx>=available.length) return; const p=available[idx]; container.innerHTML=`<div class="swipe-card"><img class="card-img" src="${p.profilePic}"><h3 style="color:white;">${p.name},${p.age}</h3><p>${p.bio}</p></div>`; } display(); document.getElementById('likeBtn').onclick=()=>{ if(idx>=available.length) return; let users=getUsers(); let curr=users.find(u=>u.id===currentUser.id), target=users.find(u=>u.id===available[idx].id); curr.swipedRight.push(target.id); if(target.likedBy.includes(curr.id)){ curr.matches.push(target.id); target.matches.push(curr.id); alert(`✨ Matched with ${target.name}! ✨`); }else{ target.likedBy.push(curr.id); } updateCurrentUserInDB(curr); saveUsers(users); idx++; if(idx<available.length) display(); else renderSwipeCards(); renderProfileUI(); renderChatList(); }; document.getElementById('passBtn').onclick=()=>{ idx++; if(idx<available.length) display(); else renderSwipeCards(); }; }
    function renderExplore(){ let users=getUsers(); let filtered=users.filter(u=>u.id!==currentUser.id); const maxAge=parseInt(document.getElementById('filterAge').value)||100,gender=document.getElementById('filterGender').value; if(gender) filtered=filtered.filter(u=>u.gender===gender); filtered=filtered.filter(u=>u.age<=maxAge); document.getElementById('exploreList').innerHTML=filtered.map(u=>`<div class="explore-card"><img src="${u.profilePic}" width="80" style="border-radius:50%;"><h4>${u.name},${u.age}</h4><button class="small-glass explore-like" data-id="${u.id}">Like</button></div>`).join(''); document.querySelectorAll('.explore-like').forEach(btn=>btn.addEventListener('click',()=>{ let targetId=btn.dataset.id; let users=getUsers(); let curr=users.find(u=>u.id===currentUser.id), target=users.find(u=>u.id===targetId); curr.swipedRight.push(targetId); if(target.likedBy.includes(curr.id)){ curr.matches.push(targetId); target.matches.push(curr.id); alert(`Matched with ${target.name}!`); }else{ target.likedBy.push(curr.id); } updateCurrentUserInDB(curr); saveUsers(users); renderExplore(); renderProfileUI(); renderChatList(); })); }

    // Messaging
    let currentChatPartner = null, typingTimeout = null, replyToMessage = null;
    function renderChatList() {
        const container = document.getElementById('chatListContainer');
        const matches = getUsers().filter(u => currentUser.matches.includes(u.id));
        if(matches.length===0){ container.innerHTML=`<div class="glass-card" style="padding:20px;text-align:center;">No matches yet. Start swiping!</div>`; return; }
        const messagesStore = getMessagesStore();
        const listHtml = matches.map(m => {
            const chatKey = [currentUser.id, m.id].sort().join('_');
            const msgs = messagesStore[chatKey] || [];
            const lastMsg = msgs[msgs.length-1];
            const lastText = lastMsg ? (lastMsg.senderId === currentUser.id ? "You: " : "") + lastMsg.text.substring(0, 30) : "Say hi!";
            const time = lastMsg ? new Date(lastMsg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
            const unread = msgs.filter(msg => msg.senderId === m.id && msg.status !== "read").length;
            return `<div class="chat-list-item" data-id="${m.id}"><div style="position:relative;"><img class="avatar" src="${m.profilePic}">${m.online ? '<span class="online-dot"></span>' : ''}</div><div class="chat-info"><div class="chat-name">${m.name}</div><div class="last-msg">${lastText}</div></div><div class="chat-meta"><div class="time">${time}</div>${unread ? `<div class="unread-badge">${unread}</div>` : ''}</div></div>`;
        }).join('');
        container.innerHTML = `<div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Search chats..." id="searchChatInput"></div>${listHtml}`;
        document.getElementById('searchChatInput')?.addEventListener('input', (e) => { const term = e.target.value.toLowerCase(); document.querySelectorAll('.chat-list-item').forEach(el => { const name = el.querySelector('.chat-name')?.innerText.toLowerCase(); el.style.display = name?.includes(term) ? 'flex' : 'none'; }); });
        document.querySelectorAll('.chat-list-item').forEach(el => el.addEventListener('click', () => openChatScreen(el.dataset.id)));
    }
    function openChatScreen(partnerId) {
        currentChatPartner = partnerId;
        const users = getUsers();
        const partner = users.find(u => u.id === partnerId);
        document.getElementById('chatListContainer').style.display = 'none';
        const screenDiv = document.getElementById('chatScreenContainer');
        screenDiv.style.display = 'block';
        screenDiv.innerHTML = `
            <div class="chat-header"><button class="back-btn" id="backToChatList"><i class="fas fa-arrow-left"></i></button><div class="chat-profile"><img src="${partner.profilePic}" id="chatAvatar"><div><div class="chat-name">${partner.name}</div><div class="chat-status" id="chatStatus">${partner.online ? 'Online' : 'Offline'}</div></div></div><div class="chat-actions"><i class="fas fa-phone" id="callDemo"></i><i class="fas fa-video" id="videoDemo"></i><i class="fas fa-ellipsis-v" id="menuUnmatch"></i></div></div>
            <div class="messages-area" id="messagesArea"></div>
            <div id="typingIndicatorArea" class="typing-indicator" style="display:none;"><span>typing</span><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div><i class="fas fa-lock" style="margin-left:8px; font-size:0.7rem;" title="Premium feature"></i></div>
            <div class="reply-preview" id="replyPreview"></div>
            <div class="input-area"><i class="far fa-smile-wink" id="emojiBtn" style="font-size:1.5rem; color:white;"></i><i class="fas fa-paperclip" id="attachBtn" style="font-size:1.3rem; color:white;"></i><input type="text" id="messageInputChat" placeholder="Type a message..."><button id="sendChatMsg"><i class="fas fa-paper-plane"></i></button></div>
        `;
        document.getElementById('backToChatList').addEventListener('click', () => { screenDiv.style.display = 'none'; document.getElementById('chatListContainer').style.display = 'block'; currentChatPartner = null; replyToMessage = null; renderChatList(); });
        document.getElementById('callDemo')?.addEventListener('click', () => alert("Call UI demo"));
        document.getElementById('videoDemo')?.addEventListener('click', () => alert("Video call demo"));
        document.getElementById('menuUnmatch')?.addEventListener('click', () => { if(confirm(`Unmatch ${partner.name}?`)){ let users = getUsers(); let curr = users.find(u=>u.id===currentUser.id); curr.matches = curr.matches.filter(id => id !== partnerId); updateCurrentUserInDB(curr); saveUsers(users); alert("Unmatched"); document.getElementById('backToChatList').click(); renderChatList(); } });
        document.getElementById('chatAvatar')?.addEventListener('click', () => alert(`Quick view: ${partner.name}, ${partner.age}\n${partner.bio}`));
        loadMessagesForChat(partnerId);
        const input = document.getElementById('messageInputChat');
        input?.addEventListener('focus', () => simulateTyping(partnerId));
        document.getElementById('sendChatMsg')?.addEventListener('click', () => sendMessage(partnerId));
        input?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(partnerId); });
        document.getElementById('messagesArea')?.addEventListener('dblclick', (e) => { let msgDiv = e.target.closest('.message-bubble'); if(msgDiv && msgDiv.classList.contains('sent')) alert("❤️ You liked this message"); });
        let touchStartX = 0;
        document.getElementById('messagesArea')?.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
        document.getElementById('messagesArea')?.addEventListener('touchend', (e) => { if(touchStartX - e.changedTouches[0].clientX > 50) { let msgDiv = e.target.closest('.message-bubble'); if(msgDiv){ let msgText = msgDiv.querySelector('.message-text')?.innerText; replyToMessage = msgText; document.getElementById('replyPreview').innerHTML = `Replying: "${msgText.substring(0,30)}" <i class="fas fa-times-circle" id="cancelReply"></i>`; document.getElementById('replyPreview').style.display = 'block'; document.getElementById('cancelReply')?.addEventListener('click',()=>{ replyToMessage=null; document.getElementById('replyPreview').style.display='none'; }); } } });
    }
    function simulateTyping(partnerId) {
        const typingDiv = document.getElementById('typingIndicatorArea');
        if(typingDiv) typingDiv.style.display = 'flex';
        if(typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { if(typingDiv) typingDiv.style.display = 'none'; }, 2000);
    }
    function loadMessagesForChat(partnerId) {
        const chatKey = [currentUser.id, partnerId].sort().join('_');
        let store = getMessagesStore();
        let messages = store[chatKey] || [];
        const area = document.getElementById('messagesArea');
        function renderMessages() {
            area.innerHTML = messages.map(msg => {
                const isSent = msg.senderId === currentUser.id;
                const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                let statusIcon = '';
                if(isSent && msg.status === 'sent') statusIcon = '✓';
                else if(isSent && msg.status === 'delivered') statusIcon = '✓✓';
                else if(isSent && msg.status === 'read') statusIcon = '✓✓ (blue)';
                return `<div class="message-bubble ${isSent ? 'sent' : 'received'}"><div class="message-text">${msg.text}</div><div class="message-time">${time} ${isSent ? `<span class="message-status">${statusIcon}</span>` : ''}</div></div>`;
            }).join('');
            area.scrollTop = area.scrollHeight;
        }
        renderMessages();
        let updated = false;
        messages.forEach(msg => { if(msg.senderId === partnerId && msg.status !== 'read') { msg.status = 'read'; updated = true; } });
        if(updated) { store[chatKey] = messages; saveMessagesStore(store); renderMessages(); }
    }
    function sendMessage(partnerId) {
        const input = document.getElementById('messageInputChat');
        const text = input.value.trim();
        if(!text) return;
        const chatKey = [currentUser.id, partnerId].sort().join('_');
        let store = getMessagesStore();
        let messages = store[chatKey] || [];
        const newMsg = { id: "m"+Date.now(), senderId: currentUser.id, text: text, timestamp: Date.now(), status: 'sent' };
        messages.push(newMsg);
        store[chatKey] = messages;
        saveMessagesStore(store);
        input.value = '';
        loadMessagesForChat(partnerId);
        setTimeout(() => {
            let store2 = getMessagesStore();
            let msgs = store2[chatKey] || [];
            const replyText = "Thanks for your message! 😊 (auto-reply)";
            const autoReply = { id: "m"+Date.now(), senderId: partnerId, text: replyText, timestamp: Date.now(), status: 'delivered' };
            msgs.push(autoReply);
            store2[chatKey] = msgs;
            saveMessagesStore(store2);
            if(currentChatPartner === partnerId) loadMessagesForChat(partnerId);
            else renderChatList();
        }, 2000);
        renderChatList();
    }

    // Profile & Settings
    function updateProfileCompletion() { const fields = [currentUser.name, currentUser.bio, currentUser.location, currentUser.interests?.length]; let filled = fields.filter(f => f && (Array.isArray(f) ? f.length>0 : true)).length; let percent = (filled/4)*100; document.getElementById('profileProgress').style.width = percent+'%'; }
    function renderProfileUI() {
        document.getElementById('profileUsername').innerText = currentUser.name;
        document.getElementById('profileStatus').innerText = currentUser.bio || "Hey there!";
        document.getElementById('profileAvatar').src = currentUser.profilePic;
        document.getElementById('matchesCount').innerText = currentUser.matches?.length || 0;
        document.getElementById('likesCount').innerText = currentUser.likesReceived || 0;
        document.getElementById('viewsCount').innerText = currentUser.profileViews || 0;
        const lastSeenDate = currentUser.lastSeen ? new Date(currentUser.lastSeen).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "recently";
        document.getElementById('lastSeenPreview').innerText = `Last seen today at ${lastSeenDate}`;
        updateProfileCompletion();
        const settingsList = [
            { icon: "fas fa-user-circle", title: "Account", key: "account" }, { icon: "fas fa-lock", title: "Privacy", key: "privacy" }, { icon: "fas fa-bell", title: "Notifications", key: "notifications" }, { icon: "fas fa-comment-dots", title: "Chats", key: "chats" }, { icon: "fas fa-palette", title: "Appearance", key: "appearance" }, { icon: "fas fa-heart", title: "Dating Preferences", key: "dating" }, { icon: "fas fa-crown", title: "Premium Features", key: "premium" }, { icon: "fas fa-question-circle", title: "Help & Support", key: "help" }
        ];
        document.getElementById('settingsListContainer').innerHTML = settingsList.map(s => `<div class="settings-item" data-key="${s.key}"><div class="settings-item-left"><i class="${s.icon}" style="width:24px"></i><span>${s.title}</span></div><i class="fas fa-chevron-right"></i></div>`).join('');
        document.querySelectorAll('.settings-item').forEach(el => el.addEventListener('click', () => showSettingsDetail(el.dataset.key)));
        document.getElementById('openSettingsBtn').onclick = () => showSettingsDetail('account');
        document.getElementById('editProfileBtn').onclick = () => { document.getElementById('profileView').classList.remove('active-view'); document.getElementById('editProfileView').style.display = 'block'; loadEditProfile(); };
        document.getElementById('shareProfileBtn').onclick = () => alert("Share profile link (demo)");
        document.getElementById('boostProfileBtn').onclick = () => alert("✨ Boost mode activated (premium UI)");
        document.getElementById('changePhotoBtn').onclick = () => document.getElementById('photoUploadInput').click();
        document.getElementById('photoUploadInput').onchange = (e) => { if(e.target.files[0]){ const reader = new FileReader(); reader.onload = ev => { document.getElementById('profileAvatar').src = ev.target.result; currentUser.profilePic = ev.target.result; updateCurrentUserInDB(currentUser); }; reader.readAsDataURL(e.target.files[0]); } };
        document.getElementById('logoutBtnProfile').onclick = () => { localStorage.removeItem('currentUser'); window.location.reload(); };
    }
    function loadEditProfile() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editBio').value = currentUser.bio;
        document.getElementById('editGender').value = currentUser.gender;
        document.getElementById('editAge').value = currentUser.age;
        document.getElementById('editLocation').value = currentUser.location;
        const interests = currentUser.interests || [];
        const container = document.getElementById('interestsContainer');
        function renderTags() { container.innerHTML = interests.map((tag,i) => `<span class="tag">${tag} <i class="fas fa-times-circle remove-tag" data-index="${i}"></i></span>`).join(''); document.querySelectorAll('.remove-tag').forEach(btn => btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.index); interests.splice(idx,1); renderTags(); })); }
        renderTags();
        document.getElementById('newInterestInput').onkeypress = (e) => { if(e.key === 'Enter' && e.target.value.trim()){ interests.push(e.target.value.trim()); renderTags(); e.target.value = ''; } };
        document.getElementById('photoGrid').innerHTML = `<img src="${currentUser.profilePic}"><div class="small-glass" style="display:flex; align-items:center;">+ Add</div>`;
        document.getElementById('saveProfileChanges').onclick = () => { currentUser.name = document.getElementById('editName').value; currentUser.bio = document.getElementById('editBio').value; currentUser.gender = document.getElementById('editGender').value; currentUser.age = parseInt(document.getElementById('editAge').value); currentUser.location = document.getElementById('editLocation').value; currentUser.interests = interests; updateCurrentUserInDB(currentUser); alert("Profile updated"); document.getElementById('backFromEdit').click(); };
        document.getElementById('backFromEdit').onclick = () => { document.getElementById('editProfileView').style.display = 'none'; document.getElementById('profileView').classList.add('active-view'); renderProfileUI(); };
    }
    function showSettingsDetail(section) {
        document.getElementById('profileView').classList.remove('active-view');
        document.getElementById('settingsDetailView').style.display = 'block';
        document.getElementById('settingsTitle').innerText = section.charAt(0).toUpperCase() + section.slice(1);
        let content = '';
        const settings = JSON.parse(localStorage.getItem('appSettings') || '{}');
        const prefs = JSON.parse(localStorage.getItem('datingPreferences') || '{}');
        if (section === 'account') content = `<div class="settings-item"><div>Change email/phone</div><i class="fas fa-chevron-right"></i></div><div class="settings-item"><div>Update password</div><i class="fas fa-chevron-right"></i></div><div class="settings-item"><div>Two-factor authentication</div><div class="toggle-switch" id="2faToggle"><div class="toggle-knob"></div></div></div>`;
        else if (section === 'privacy') content = `<div class="settings-item"><div>Last seen</div><div class="toggle-switch ${settings.lastSeen ? 'active' : ''}" id="lastSeenToggle"><div class="toggle-knob"></div></div></div><div class="settings-item"><div>Online status</div><div class="toggle-switch ${settings.onlineStatus ? 'active' : ''}" id="onlineStatusToggle"><div class="toggle-knob"></div></div></div><div class="settings-item"><div>Profile visibility</div><div class="toggle-switch ${settings.profileVisibility === 'public' ? 'active' : ''}" id="visibilityToggle"><div class="toggle-knob"></div></div></div><div class="settings-item"><div>Blocked users</div><i class="fas fa-chevron-right"></i></div>`;
        else if (section === 'notifications') content = `<div class="settings-item"><div>Message notifications</div><div class="toggle-switch ${settings.messageNotif ? 'active' : ''}" id="notifToggle"><div class="toggle-knob"></div></div></div><div class="settings-item"><div>Match alerts</div><div class="toggle-switch active"><div class="toggle-knob"></div></div></div>`;
        else if (section === 'chats') content = `<div class="settings-item"><div>Chat backup</div><i class="fas fa-chevron-right"></i></div><div class="settings-item"><div>Clear chat history</div><i class="fas fa-chevron-right"></i></div>`;
        else if (section === 'appearance') content = `<div class="settings-item"><div>Dark mode</div><div class="toggle-switch" id="darkModeToggle"><div class="toggle-knob"></div></div></div><div class="settings-item"><div>Theme color</div><select><option>Green</option><option>Blue</option></select></div>`;
        else if (section === 'dating') content = `<div class="settings-item"><div>Age range</div><div class="slider-container"><span>${prefs.ageMin}</span><input type="range" id="ageMinSlider" min="18" max="60" value="${prefs.ageMin}"><span>${prefs.ageMax}</span><input type="range" id="ageMaxSlider" min="18" max="60" value="${prefs.ageMax}"></div></div><div class="settings-item"><div>Distance radius (km)</div><input type="range" id="distanceSlider" min="5" max="100" value="${prefs.distance}"><span id="distanceVal">${prefs.distance}</span></div><button class="small-glass" id="savePrefsBtn">Save Preferences</button>`;
        else if (section === 'premium') content = `<div class="premium-card"><i class="fas fa-crown" style="font-size:2rem; color:gold;"></i><h3>Get Verified</h3><p>Blue check badge & priority</p><button class="small-glass" id="verifyBtn">Upgrade Now</button><hr><div><i class="fas fa-lock"></i> See who liked you 🔒<br><i class="fas fa-infinity"></i> Unlimited swipes</div></div>`;
        else if (section === 'help') content = `<div class="settings-item">FAQ</div><div class="settings-item">Contact support</div><div class="settings-item">Report a problem</div>`;
        document.getElementById('settingsDetailContent').innerHTML = content;
        document.querySelectorAll('.toggle-switch').forEach(t => t.addEventListener('click', function(e){ e.stopPropagation(); this.classList.toggle('active'); let val = this.classList.contains('active'); if(this.id === 'lastSeenToggle') settings.lastSeen = val; else if(this.id === 'onlineStatusToggle') settings.onlineStatus = val; else if(this.id === 'visibilityToggle') settings.profileVisibility = val ? 'public' : 'matches'; else if(this.id === 'notifToggle') settings.messageNotif = val; else if(this.id === 'darkModeToggle') alert("Dark mode demo"); localStorage.setItem('appSettings', JSON.stringify(settings)); }));
        if(document.getElementById('ageMinSlider')){ document.getElementById('ageMinSlider').oninput = () => { prefs.ageMin = parseInt(document.getElementById('ageMinSlider').value); localStorage.setItem('datingPreferences', JSON.stringify(prefs)); showSettingsDetail('dating'); }; }
        if(document.getElementById('ageMaxSlider')){ document.getElementById('ageMaxSlider').oninput = () => { prefs.ageMax = parseInt(document.getElementById('ageMaxSlider').value); localStorage.setItem('datingPreferences', JSON.stringify(prefs)); showSettingsDetail('dating'); }; }
        if(document.getElementById('distanceSlider')){ document.getElementById('distanceSlider').oninput = () => { let val = document.getElementById('distanceSlider').value; document.getElementById('distanceVal').innerText = val; prefs.distance = val; localStorage.setItem('datingPreferences', JSON.stringify(prefs)); }; }
        if(document.getElementById('savePrefsBtn')) document.getElementById('savePrefsBtn').onclick = () => alert("Preferences saved");
        if(document.getElementById('verifyBtn')) document.getElementById('verifyBtn').onclick = () => alert("Premium upgrade (UI demo)");
        document.getElementById('backFromSettings').onclick = () => { document.getElementById('settingsDetailView').style.display = 'none'; document.getElementById('profileView').classList.add('active-view'); renderProfileUI(); };
    }
    function attachNavEvents() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const viewId = item.dataset.nav;
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
                document.getElementById(viewId + 'View').classList.add('active-view');
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                if(viewId === 'messages') { document.getElementById('chatListContainer').style.display = 'block'; document.getElementById('chatScreenContainer').style.display = 'none'; renderChatList(); currentChatPartner = null; }
                if(viewId === 'explore') renderExplore();
                if(viewId === 'profile') renderProfileUI();
                if(viewId === 'swipe') renderSwipeCards();
                document.getElementById('editProfileView').style.display = 'none';
                document.getElementById('settingsDetailView').style.display = 'none';
            });
        });
        document.querySelector('.nav-item[data-nav="swipe"]').classList.add('active');
    }
    function renderAll() { renderProfileUI(); renderChatList(); renderExplore(); }

    initDummyData();
    if(localStorage.getItem('currentUser')) { currentUser = JSON.parse(localStorage.getItem('currentUser')); showMainApp(); } else { document.getElementById('loginView').style.display = 'flex'; }
    document.querySelectorAll('.toggle-pwd').forEach(icon=>{ icon.addEventListener('click',function(){ let target=document.getElementById(this.dataset.target); if(target.type==='password') target.type='text'; else target.type='password'; this.classList.toggle('fa-eye');}); });
    document.getElementById('applyFilterBtn')?.addEventListener('click',()=>renderExplore());
</script>
</body>
